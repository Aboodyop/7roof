<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة حروف - تحديث الحروف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --red-team: #e53935;
            --green-team: #43a047;
            --bg-color: #0f172a;
            --tile-default: #475569;
            --hex-w: 80px; 
            --hex-h: 92.37px; 
        }

        body {
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: #1e40af;
            padding: 10px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .scoreboard {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }

        .team-card {
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            border: 4px solid #334155;
            transition: 0.3s;
            cursor: pointer;
            user-select: none;
        }

        .active-red { border-color: var(--red-team); box-shadow: 0 0 20px var(--red-team); background: rgba(229, 57, 53, 0.2); }
        .active-green { border-color: var(--green-team); box-shadow: 0 0 20px var(--green-team); background: rgba(67, 160, 71, 0.2); }

        .honeycomb-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .row {
            display: flex;
            margin-top: -22px; 
        }

        .row:first-child { margin-top: 0; }

        .row:nth-child(even) {
            transform: translateX(-41px); 
        }

        .hexagon {
            width: var(--hex-w);
            height: var(--hex-h);
            background-color: var(--tile-default);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin: 1px;
            position: relative;
        }

        .hexagon.border-red { background-color: var(--red-team); cursor: default; }
        .hexagon.border-green { background-color: var(--green-team); cursor: default; }
        
        .hexagon.red { background-color: var(--red-team); }
        .hexagon.green { background-color: var(--green-team); }

        .hexagon:hover {
            filter: brightness(1.3);
            z-index: 10;
            transform: scale(1.05);
        }

        .controls { margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        #overlay, .win-selection-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .win-selection-modal {
            background: #1e293b;
            width: 320px; height: 220px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid #3b82f6; border-radius: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">📺 مسابقة حروف</h1>
</header>

<div class="scoreboard">
    <div id="card-red" class="team-card active-red" ondblclick="setTurn('red')">الفريق الأحمر</div>
    <div id="card-green" class="team-card" ondblclick="setTurn('green')">الفريق الأخضر</div>
</div>

<div class="honeycomb-container" id="grid"></div>

<div class="controls">
    <button style="background: #ffd700;" onclick="openWinModal()">🏆 تحديد الفائز</button>
    <button style="background: #3b82f6; color: white;" onclick="shuffleLettersOnly()">🔀 تغيير الحروف</button>
    <button style="background: #ef4444; color: white;" onclick="resetGame()">🔁 إعادة اللعبة</button>
</div>

<div id="win-modal" class="win-selection-modal">
    <h3 style="margin-bottom: 20px;">من الفائز بالجولة؟</h3>
    <div style="display: flex; gap: 10px;">
        <button style="background: var(--red-team); color: white;" onclick="triggerWin('red')">الأحمر</button>
        <button style="background: var(--green-team); color: white;" onclick="triggerWin('green')">الأخضر</button>
    </div>
    <button style="margin-top: 20px; background: #64748b; color: white;" onclick="closeWinModal()">إغلاق</button>
</div>

<div id="overlay">
    <h1 id="win-text" style="font-size: 3rem; text-align: center;"></h1>
    <button onclick="resetGame()" style="padding: 15px 40px; font-size: 1.2rem; cursor:pointer; background: white; color: black; border-radius: 10px;">جولة جديدة</button>
</div>

<script>
    const ROWS = 5; 
    const COLS = 5; 
    const lettersSet = "أبتثجحخدذرزمسشصضطظعغفقكلمنهـوي".split("");
    let currentTeam = 'red';
    let board = [];

    function createBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        board = [];
        let shuffled = [...lettersSet].sort(() => 0.5 - Math.random());

        // الصف العلوي (أخضر)
        createStaticRow(grid, COLS + 2, 'border-green');

        for (let r = 0; r < ROWS; r++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            board[r] = [];
            rowDiv.appendChild(createStaticHex('border-red'));
            for (let c = 0; c < COLS; c++) {
                const hex = document.createElement('div');
                hex.className = 'hexagon letter-hex'; // كلاس خاص للحروف
                hex.innerText = shuffled[(r * COLS + c) % shuffled.length];
                hex.onclick = () => onHexClick(r, c, hex);
                rowDiv.appendChild(hex);
                board[r][c] = { team: null, element: hex };
            }
            rowDiv.appendChild(createStaticHex('border-red'));
            grid.appendChild(rowDiv);
        }

        // الصف السفلي (أخضر)
        createStaticRow(grid, COLS + 2, 'border-green');
    }

    // وظيفة تغيير الحروف فقط دون مسح الألوان
    function shuffleLettersOnly() {
        let shuffled = [...lettersSet].sort(() => 0.5 - Math.random());
        let index = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                // نغير النص فقط، الحالة اللونية ستبقى كما هي في الـ CSS
                board[r][c].element.innerText = shuffled[index % shuffled.length];
                index++;
            }
        }
    }

    function createStaticRow(container, count, className) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';
        for (let i = 0; i < count; i++) {
            rowDiv.appendChild(createStaticHex(className));
        }
        container.appendChild(rowDiv);
    }

    function createStaticHex(className) {
        const hex = document.createElement('div');
        hex.className = 'hexagon ' + className;
        hex.innerText = ""; 
        return hex;
    }

    function onHexClick(r, c, el) {
        if (board[r][c].team) return;
        board[r][c].team = currentTeam;
        el.classList.add(currentTeam);
        currentTeam = (currentTeam === 'red') ? 'green' : 'red';
        updateUI();
    }

    function setTurn(team) { currentTeam = team; updateUI(); }
    function updateUI() {
        document.getElementById('card-red').classList.toggle('active-red', currentTeam === 'red');
        document.getElementById('card-green').classList.toggle('active-green', currentTeam === 'green');
    }
    function openWinModal() { document.getElementById('win-modal').style.display = 'flex'; }
    function closeWinModal() { document.getElementById('win-modal').style.display = 'none'; }
    function triggerWin(team) {
        closeWinModal();
        document.getElementById('win-text').innerText = team === 'red' ? "مبروك للفريق الأحمر! 🔴" : "مبروك للفريق الأخضر! 🟢";
        document.getElementById('overlay').style.display = 'flex';
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
    }
    function resetGame() {
        currentTeam = 'red';
        document.getElementById('overlay').style.display = 'none';
        updateUI();
        createBoard();
    }
    window.onload = createBoard;
</script>
</body>
</html>
